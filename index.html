<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resto Keep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #999;
      }

      /* Print Styles */
      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        
        html, body {
          margin: 0 !important;
          padding: 0 !important;
          background: #fff !important;
          width: 100% !important;
        }

        /* Hide everything */
        body * {
          visibility: hidden !important;
          display: none !important;
        }

        /* Show only the invoice/KOT and its parents in a way that doesn't break layout */
        #root, 
        #root > div, 
        main, 
        .fixed, 
        .relative, 
        #invoice-content, 
        #invoice-content *,
        #kot-content,
        #kot-content * {
          visibility: visible !important;
          display: block !important;
        }

        /* Reset fixed/absolute positioning for parents to ensure normal flow */
        #root, 
        #root > div, 
        main, 
        .fixed, 
        .relative {
          position: static !important;
          width: 100% !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          border: none !important;
          box-shadow: none !important;
          transform: none !important;
          overflow: visible !important;
        }

        /* Target the specific invoice/KOT container */
        #invoice-content,
        #kot-content {
          width: 80mm !important; /* Standard thermal printer width */
          max-width: 100% !important;
          margin: 0 auto !important;
          padding: 5mm !important;
          background: #fff !important;
          position: relative !important;
        }

        /* Ensure text is black and visible */
        #invoice-content *,
        #kot-content * {
          color: #000 !important;
          background: transparent !important;
        }

        /* Hide specific UI elements that might still be visible */
        .print\:hidden,
        button,
        nav,
        aside,
        .sidebar,
        .no-print,
        .close-button,
        .bg-slate-900\/60,
        .backdrop-blur-sm {
          display: none !important;
          visibility: hidden !important;
        }

        /* Force images to be visible */
        #invoice-content img {
          display: block !important;
          visibility: visible !important;
          max-width: 100% !important;
        }
      }
    </style>
