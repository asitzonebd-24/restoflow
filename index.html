    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #999;
      }

      /* Print Styles */
      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        
        html, body {
          margin: 0 !important;
          padding: 0 !important;
          background: #fff !important;
          width: 100% !important;
          height: auto !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Hide the main app and all other elements */
        body > *:not(#print-container) {
          display: none !important;
        }

        /* Show only the temporary print container */
        #print-container {
          display: block !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 5mm !important;
          background: #fff !important;
          position: relative !important;
        }

        /* Ensure all children are visible and use high-contrast text */
        #print-container * {
          visibility: visible !important;
          color: #000 !important;
          border-color: #000 !important;
          font-family: 'Inter', sans-serif !important;
        }

        /* Specific overrides for flex items in print */
        #print-container .flex {
          display: flex !important;
          flex-direction: row !important;
          justify-content: space-between !important;
          align-items: center !important;
          width: 100% !important;
        }

        #print-container .flex-col {
          flex-direction: column !important;
        }

        #print-container .items-center {
          align-items: center !important;
        }

        #print-container .justify-between {
          justify-content: space-between !important;
        }

        #print-container .justify-center {
          justify-content: center !important;
        }

        #print-container .text-center {
          text-align: center !important;
        }

        #print-container .text-right {
          text-align: right !important;
        }

        /* Standardize font sizes for thermal printers */
        #print-container {
          font-size: 12pt !important;
          line-height: 1.2 !important;
        }

        #print-container h2 {
          font-size: 16pt !important;
          font-weight: bold !important;
          margin-bottom: 5pt !important;
          text-align: center !important;
        }

        #print-container .text-[10px],
        #print-container .text-[8px] {
          font-size: 10pt !important;
        }

        /* Force images to be visible and centered */
        #print-container img {
          display: block !important;
          visibility: visible !important;
          max-width: 40mm !important;
          margin: 0 auto 10pt auto !important;
        }
      }
    </style>
