<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resto Keep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #999;
      }

      /* Print Styles */
      @media print {
        @page {
          margin: 0;
          size: portrait;
        }
        
        html, body {
          margin: 0 !important;
          padding: 0 !important;
          height: auto !important;
          overflow: visible !important;
          background: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Hide everything by default */
        body * {
          visibility: hidden !important;
        }

        /* Show the invoice content and its children */
        #invoice-content, 
        #invoice-content * {
          visibility: visible !important;
          color: black !important;
        }

        /* Position the invoice content at the top left of the printed page */
        #invoice-content {
          position: fixed !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          display: block !important;
          padding: 20px !important;
          margin: 0 !important;
          overflow: visible !important;
          background: white !important;
          z-index: 999999 !important;
          visibility: visible !important;
        }

        /* Ensure all ancestor containers are visible and don't clip */
        #root, 
        #root > div, 
        main, 
        .fixed, 
        .relative, 
        .inset-0 {
          visibility: visible !important;
          overflow: visible !important;
          height: auto !important;
          min-height: auto !important;
          display: block !important;
          position: static !important;
          opacity: 1 !important;
          padding: 0 !important;
          margin: 0 !important;
          border: none !important;
          box-shadow: none !important;
          transform: none !important;
          animation: none !important;
        }

        /* Explicitly hide non-essential UI elements */
        .print\:hidden, 
        .bg-slate-900\/60, 
        .backdrop-blur-sm, 
        button,
        nav,
        aside,
        .sidebar,
        .no-print {
          display: none !important;
          visibility: hidden !important;
        }
      }
    </style>
