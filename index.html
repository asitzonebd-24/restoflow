<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resto Keep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #999;
      }

      /* Print Styles */
      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        
        html, body {
          margin: 0 !important;
          padding: 0 !important;
          background: #fff !important;
          width: 100% !important;
          height: auto !important;
          visibility: hidden !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Target the specific invoice/KOT container and make it visible */
        #invoice-content,
        #kot-content,
        .print-visible {
          visibility: visible !important;
          display: block !important;
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 80mm !important; /* Standard thermal printer width */
          margin: 0 !important;
          padding: 4mm !important;
          background: #fff !important;
          z-index: 99999 !important;
          box-shadow: none !important;
        }

        /* Ensure all children of the content are visible and preserve their layout */
        #invoice-content *,
        #kot-content *,
        .print-visible * {
          visibility: visible !important;
          display: block !important; /* Force block for better thermal printer compatibility */
          width: auto !important;
          float: none !important;
        }

        /* Specific overrides for flex items in print */
        #invoice-content .flex,
        #kot-content .flex {
          display: flex !important;
          flex-direction: row !important;
          justify-content: space-between !important;
          width: 100% !important;
        }

        /* Hide everything else */
        #root > *:not(.print-visible),
        .print\:hidden,
        button,
        nav,
        aside,
        .sidebar,
        .no-print,
        .close-button,
        .bg-slate-900\/60,
        .backdrop-blur-sm {
          display: none !important;
          visibility: hidden !important;
        }

        /* Ensure text is high contrast black for thermal printers */
        #invoice-content *,
        #kot-content * {
          color: #000 !important;
          border-color: #000 !important;
          font-family: 'Courier New', Courier, monospace !important; /* Monospace often prints better on thermal */
          font-size: 12pt !important;
          line-height: 1.2 !important;
        }

        #invoice-content h2,
        #kot-content h2 {
          font-size: 16pt !important;
          font-weight: bold !important;
          margin-bottom: 5pt !important;
        }

        #invoice-content .text-[10px],
        #kot-content .text-[10px],
        #invoice-content .text-[8px],
        #kot-content .text-[8px] {
          font-size: 10pt !important;
        }

        /* Force images to be visible and centered */
        #invoice-content img,
        #kot-content img {
          display: block !important;
          visibility: visible !important;
          max-width: 40mm !important;
          margin: 0 auto 10pt auto !important;
        }
      }
    </style>
